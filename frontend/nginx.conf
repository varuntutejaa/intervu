server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # React Router client-side routes — any path not matching a real static
  # file falls back to index.html so refreshing /jobs/8 doesn't 404.
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Same-origin API calls proxy to the backend container (docker-compose
  # network) — mirrors what CloudFront does in the real prod deployment, so
  # the frontend's relative /api/... fetches work unmodified in either setup.
  location /api {
    proxy_pass http://backend:3001;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_cookie_path / /;
  }
}
