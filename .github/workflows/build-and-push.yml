name: Build and Push Images

# Builds the backend and frontend Docker images and pushes them to GitHub
# Container Registry on every merge to main — separate from deploy.yml/
# deploy-frontend.yml (which ship code directly to EC2/S3, not an image).
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - name: backend
            context: backend
          - name: frontend
            context: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push ${{ matrix.name }} image
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/intervu-${{ matrix.name }}:latest
            ghcr.io/${{ github.repository_owner }}/intervu-${{ matrix.name }}:${{ github.sha }}
