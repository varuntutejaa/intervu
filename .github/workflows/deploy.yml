name: Deploy Backend

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - ".github/workflows/deploy.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ~/intervu
            git fetch origin main
            git reset --hard origin/main

            # t3.micro has only 1 GB RAM — npm ci with native deps gets OOM-killed
            # without swap. Create a 2 GB swap file if one doesn't already exist.
            if ! swapon --show | grep -q /swapfile; then
              sudo fallocate -l 2G /swapfile
              sudo chmod 600 /swapfile
              sudo mkswap /swapfile
              sudo swapon /swapfile
            fi

            # Aggressive disk cleanup — the default 8 GB root volume fills up
            # quickly with onnxruntime GPU binaries, old node_modules, apt cache,
            # and pm2 logs.
            rm -rf node_modules backend/node_modules frontend/node_modules
            npm cache clean --force 2>/dev/null || true
            sudo apt-get clean 2>/dev/null || true
            sudo journalctl --vacuum-time=1d 2>/dev/null || true
            pm2 flush 2>/dev/null || true
            # Log disk space for debugging
            df -h /

            # If the EBS volume was resized (e.g. via Terraform or AWS console),
            # grow the filesystem to use the new space without rebooting.
            sudo resize2fs /dev/nvme0n1p1 2>/dev/null || \
              sudo resize2fs /dev/xvda1 2>/dev/null || true

            cd backend
            # This is a CPU-only instance — the app only ever runs local
            # embeddings on CPU, never GPU. onnxruntime-node's installer
            # otherwise always fetches CUDA EP binaries on linux-x64
            # regardless of whether a GPU is present, which was crashing
            # here (large download + extraction on a resource-constrained
            # t3.micro). Skipping it removes an unnecessary point of failure.
            ONNXRUNTIME_NODE_INSTALL=skip npm ci
            npm run build
            pm2 restart intervu-backend --update-env || pm2 start dist/index.js --name intervu-backend
            pm2 save
