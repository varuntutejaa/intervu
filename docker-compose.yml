services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: intervu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - intervu_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Overrides backend/.env's PGHOST so the container talks to the `db`
      # service on the compose network instead of a real RDS endpoint —
      # everything else (credentials, API keys) still comes from .env.
      PGHOST: db
      PGPORT: 5432
      PGDATABASE: intervu
      PGUSER: postgres
      PGPASSWORD: postgres
      DB_SSL: "false"
      CORS_ORIGIN: http://localhost:8080
      PUBLIC_URL: http://localhost:8080
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  intervu_db_data:
