services:
  # Not used by default (backend talks to real RDS, see below) — kept as an
  # opt-in fully-local alternative. Behind a profile so a plain
  # `docker compose up` doesn't start an unused container; run with
  # `docker compose --profile local-db up` to include it.
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    profiles: ["local-db"]
    environment:
      POSTGRES_DB: intervu
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - intervu_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build: ./backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      # Talks to the real RDS instance via backend/.env's own
      # PGHOST/PGUSER/PGPASSWORD/DB_SSL — not the bundled `db` service
      # below. Only CORS_ORIGIN/PUBLIC_URL are overridden here, since the
      # frontend is served from this compose stack on :8080, not .env's
      # dev default of :5174.
      #
      # To run fully local instead (no RDS credentials needed, isolated
      # test data), add back: PGHOST=db, PGPORT=5432, PGDATABASE=intervu,
      # PGUSER=postgres, PGPASSWORD=postgres, DB_SSL=false — and add
      # `depends_on: db: condition: service_healthy` below.
      CORS_ORIGIN: http://localhost:8080
      PUBLIC_URL: http://localhost:8080
    ports:
      - "3001:3001"

  frontend:
    build: ./frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  intervu_db_data:
